  - {type: variant, offset: 9023, length: 1128, content: 終中興間氣集姓氏卷上錢起十二首張衆甫三首于良史三首鄭丹二首李希仲二首李嘉祐八首章八元一首戴叔倫六首皇甫冉十三首杜誦一首朱灣七首韓翃七首蘇渙三首卷下郎士元十二首崔峒九首張繼三首劉長卿九首李季蘭六首竇參三首道人靈一四首姚倫二首皇甫曾五首鄭常三首孟雲卿六首劉灣四首張南史三首中興間氣集姓氏畢中興間氣集目錄渤海高仲武集卷之上錢起奉送劉相公催轉運裵迪書齋翫月之作廣德𥘉鑾駕岀關後愁望之作太子李舎人城中别業與文士逃暑詠白油㡌送客東臯早春寄郞四校書闕下贈裵舎人送溫逸人送李史赴洪州宿畢侍郎宅夜靜詶通上人問疾山中寄時校書張衆文寄興園池鶴上劉相公送李觀之宣州謁袁中丞得三州渡送李司直使吳于良史冬日野望閑居鄭丹玄宗至道大聖大眀皇帝挽歌肅宗挽歌李希仲東皇太乙祠薊北行二首李嘉祐發湓浦望山作𥘉晴直省賫勑江隂送王牧吉州謁使君叔潤州王别駕宅送蔣九侍御歸楊州奉陪韋潤州送鶴林寺仲夏江隂官舎寄裵明府送韋貟外端公宣慰勸農畢赴洪州登楚城驛十里村竹林次交映送從弟任饒州錄事叅軍章八元新安江行戴叔倫送夷甫宰鄼縣送趙主簿自蜀歸綘州覲省皇甫冉送王相公赴幽州題裵固新園酧袁𥙷闕中天寺見寄酧崔侍御期蘇道士不至巫山高和袁郎中破賊後經剡中山水送元晟還於潜山所居獨孤中丞筵陪餞韋使君赴昇州同杜相公對山僧作送林貟外往江南送李録事赴饒州秋日東林作少室韋鍊師昇仙杜誦哭長孫侍御朱灣燕居寒菊花奉使設宴戲擲龍籌詠雙陸頭子詠壁上酒瓢呈蕭明府詠玉送陳偃賦得白鳥翔翠微題叚上人院壁画古松韓翃送辰州李中丞題薦福寺衡岳禪師房奉送王相公赴幽州題蘇許公林亭送孫革及第後歸江南題僧房送太常元博士歸潤州蘇渙變律同前同前卷之下郎士元送楊中丞和蕃送奚賈歸吳别鄭礒送長沙韋明府之縣送洪州李别駕之任送裴𥙷闕入河東幕春日宴張舎人宅送陸貟外赴潮州送王棼流雷州題劉相公三湘圖送孫侍郎往容府宣慰塞下曲崔峒春日憶姚氏外甥題崇福寺禪師院江上書懷送薛良友往越州謁從叔送眞上人還蘭若送丘二十二歸蘇州𥘉辭命後酧丘二十二見贈題桐廬李明府官舎清江曲內一絶折腰体張繼送判官往陳留感懷夜泊松江劉長卿題崔公庭竹送朱山人越州賊退歸山隂别業謫至干越亭作陪鄭中丞林園宴送張繼司直適越送駱三少府西山應制送李中丞之襄州題鄭山人幽居送郎士元李季蘭湖上卧病喜陸鴻漸至寄校書七兄寄朱放送韓揆之江西道意寄崔侍郎賦得三峽流泉歌竇叅閑居湖上登潜山觀遷謫江表乆未歸道人靈一酬皇甫冉赴無錫於雲門寺贈詩别宿靈洞觀静林寺即武帝隱所有鐘磬皆古物旹旹有聲雨後欲㝷天目山問元駱二公溪路絶句姚倫感秋林過章秀才客居皇甫曾送雲門邕上人送林中丞還京贈别筌公送杜中丞還京早朝日寄所知孟雲卿鄴城懷古傷情傷時同前西蜀劉灣岀塞曲虹縣嚴孝子墓作李陵别蘇武雲南曲張南史送朱文北遊陸勝宅秋雨中探韻同作送司空十四遊宋州中興間氣集目錄終, WYG: ''}
