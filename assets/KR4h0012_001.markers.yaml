  - {type: page-break, offset: 90, content: '', id: KR4h0012_WYG_003-1b}
  - {type: variant, offset: 96, length: 2456, content: 本卽從此岀矣江安傅氏有何義門校本義門所據乃述古堂影宋鈔本然又不盡與費刻同惟五人評語釐然具在又多高氏自序一首洵佳本也旣補其闕佚復校其異同以諗讀者辛酉四月無錫孫毓修識唐中興間氣集序渤海高仲武述詩人之作本諸于心心有所感而形於言言合典謨則列於風雅曁乎梁昭明載述已往撰集者數家推其風流正聲最備其餘著錄或未至焉何者英華失于浮游玉臺陷于淫靡珠英但紀朝士丹陽止錄吳人此繇曲學專門何暇兼包衆善使夫大雅君子所以對卷而長嘆也唐興一百七十載屬方隅叛渙戎事紛綸業文之人述作中廢粤若肅宗先帝以殷憂啓聖反正中原伏惟皇帝以岀震繼明保安區宇國風雅頌蔚然復興所謂文明御時上以化下者也仲武不揆菲陋輒罄謏聞博訪詞林採察謠俗起自至德元首終於大歷暮年述一作作者數千費本無此句選者二十六人詩總一百三十二二費本四首分爲兩卷七言附之略叙品彚人倫命曰中興間氣集且夫微言雖絕大制猶存何云此處疑有脫誤詳其否臧當可擬議古之作者因事造端敷弘體要立義以全其制因文以寄其心著王政之興衰表國風之善否豈其苟悅權右取媚薄俗哉今之所收殆革前弊但使體牀風雅理致淸新觀者易心聽者竦耳則朝野通取一作載格律兼收自鄶以下非所敢隸焉凡百君子幸詳至公一葉一行中上有唐字三行錢起下有十二首三字四行贍下注一作澹六行芟作救下注一作芟齊宋作宋齊八行林疎作雲深十行雅作準十二行後下有生字十五行回下注一作過十七行高下注一作江二葉一行暉作輝二行初字下無見字空格接鑾字四行闕鈔作關七行士下鈔有二三二字十四行盾鈔作質三葉二行二月黃鸝飛上林春城紫禁曉陰陰應倒轉禁作陌鸝作鶯四行對作戴下注一作對六行過溫逸人舊居作送溫逸人詩云垂白無名者何年此陸沉丘園應得性婚嫁不嬰心歲計因山薄霞栖在谷深結廬一作設筵連草色曬藥背松陰觸興雲生岫隨耕鳥下林支頤笑來客頭上有朝簪十一行送下無彈琴二字十二行處作度十三行雪作髮十六行頻作貧十九行看作瞻四葉二行事作幸四行紫氣作仙子五行百花酒滿不見君作百花滿眼不見君六行文作甫下有三首二字評云衆甫詩婉媚綺錯巧用文字工于興喩如不隨淮海變空愧稻粱恩盡陳謝之源又自當舟檝路應濟往來人得諷興之要形容體裁皆如此文流佳士也七行寄興園池鶴上劉相公作詠鶴上興元劉相公九行梁作糧十一行賦字無十二行楫作檝十五行吳下空一字又注得家花斜沙依次用十六行雪作雨遇下注一作過十九行于良史下有二首二字五葉二行望下有長安寄李贊府六字七行溼下注一作林花溼雲作煙十行鄭丹下有二首二字十一行剪作翦十三行薊作蘄十五行明下有孝字十六行謂下注一作爲十七行彊作壃十九行宗下有文明武德大聖大寧孝皇帝十一字二十行闇下注一作暗忽作又下注一作忽六葉三行李希仲下有二首二字四行李作希仲二字實作質五行前作如飛鳥落作鳥飛斷六行無亹亹二句七行祠作詞八行去作吉佩作珮十一行鈔無二首二字實是一首明本誤作二首十六行落作斷亦無夾注十七行昏下注一作沙場昏入作日下注一作入須作復下注一作須十八行節下注一作義十九行李嘉祐下有八首二字二十行流下有也字七葉二行蓋字無二行章作華四行役作設毛刻作假五行岀作生生作岀窮極筆力作窮思極筆七行湓作盆作下有時字時字以下鈔本側注九行晩望作晩照更作苦十六行王作楊十八行川下注一作天十九行風下注一作聲看作香毛刻作垂八葉九行送上有奉字端公二字鈔本無州下有幕字十一行聲作啼十二行日作自十三行林下有相字十四行林下注一作驛樹陰送從弟永任饒州錄事參軍明本毛本登楚城後爲和苗員外秋夜省直鈔本無此詩一官萬里向千溪水宿水行漁浦西日晩長煙高岸一作嶺近天空積雪遠峯低蘆花渚上鴻相叫苦竹叢一作橋邊猨暗啼聞道慈親倚門待一作望到時蘭葉正萋萋九葉一行章八元下有二首二字評云八元嘗於都亭偶題數言蓋激楚之音也會稽嚴維到驛問八元曰爾能從我學詩乎曰能少頃遂發八元已辭家維大異一作賢之遂親指喩數年詞賦擢第如雪晴山脊見沙淺浪痕交此得江山之狀貌矣三行岀作去戍下注一作渡四行笑下注一作愧寄都官李郞中明本無此詩舊宅平津邸槐陰抵漢宮鳴騮馳道上見月直廬中白雪歌偏麗靑雲宦早通悠然一逢掖千里恨淸風六行戴叔倫下鈔有二首二字評云叔倫之爲人溫雅善舉止無賢與不肖見皆盡心在租庸幕下數年夕口靡怠吏部尙書劉公與祠部員外郞張繼書博訪選材曰揖對賓客如叔倫者一見稱心其詩體格雖不越中然廨宇經山火公田沒海潮亦指事造形其骨稍軟故詩家少之送謝夷甫宰剡縣明本收詩六首鈔本惟此及廣陵送趙主薄自蜀歸二首君去方爲縣兵戈尙未銷邑中殘老小亂後少官寮廨宇經山火公田沒海潮到時應變俗新譽滿一作政餘姚十葉七行蜀下有歸絳州覲省五字八行歸下注一作之省作自九行馬作騎下注一作馬十一行皇甫冉下有十三首三字十二行評語前半鈔本云補闕自擢桂禮闈遂爲高格往以世遘艱虞避地江外每文章一到朝延而作者變色于詞場爲先後推錢爲宗伯詩家勝負或逐鹿中原如果熟任霜封籬疏從水度又裛露收新稼迎寒葺舊廬下接又燕知社日辭巢去云云十八行者下有珍奇二字二十行斯下有恨字十一葉六行裴固作許先生又注一作題裴固新園十一行袁作裴十五行蘇作藉至下有兼見寄三字十六行處作歲十七行來作還十二葉二行霄作秋下注一作霄五行迴下注一作過七行鈔無一作金三字八行鈔無於字所居字九行事作興霜作寒十行空下注一作遥十二行獨上有和字無陪字十四行鈔無一作處處四字十七行閉閣閒作開復關十八行喧作啼靜默作默寂住作駐二十行林作裴南下有幕字十三葉一行緣作違澤作塞二行湓作盆泊處作處泊三行淸作聲何云淸字不通五行汀沙作沙洲七行至下注一作到十行對下注一怍聽十二行獨作自十五行氲氲作氤氲十六行天作仙下注一作天十七行杜誦下有一首二字十八行詩下有平字十九行始終作終始故編之作故編於是集十四葉一行雅作賦舊作近下注一作廔三行颯作瑟四行朱灣下有八首二字五行從事作朱君情下注一作曠辟作徵六行幽作淸下注一作幽洪作弘九行者字無對蘇使君席詠箏柱子在秋夜燕王郞中宅詩前散木今何幸良工不棄捐力微慙一柱材薄仰羣賢但願一作且喜聲相應寧辭跡屢遷知音如見賞雅調爲君傳十行無露字中作寒義門云當作賦得寒菊得時字十二行待賞作有分十三行他迭盛作隨秋草十四行奉使設宴戲擲籠籌作韋使君席詠抝籠籌得茲字十五行今日作幸得十九行采采作受采十五葉二行上字下有未開二字瓢作杓六行玉作三按讀書敏求, WYG: 晉}
