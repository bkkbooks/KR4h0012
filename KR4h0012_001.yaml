  text: 中興間氣集校文
  hash: sha256:ca9838b45bbe3943ad3f47e533c472496f862de2afca69292ee567e5392a7ead
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0012_SBCK_001-1a}
body:
  text: 中興間氣集二卷叢刊以嘉興沈氏藏明本影印明本每半葉十行每行十八字行款與武進費氏仿宋刋本同而字句則與毛氏汲古閣刋本無大異子晉跋云家藏間氣集凡三本俱逸五人評語張衆文章八元戴叔倫孟雲卿劉灣此本亦然知毛本即從此出矣江安傅氏有何義門校本義門所據乃述古堂影宋鈔本然又不盡與費刻同惟五人評語釐然具在又多高氏自序一首洵佳本也既補其闕佚復校其異同以諗讀者辛酉四月無錫孫育修識唐中興間氣集序渤海高仲武述詩人之作本諸于心心有所感而形於言言合典謨則列於風雅暨乎梁昭明載述已往撰集者數家推其風流正聲最備其餘著録或未至焉何者英華失于浮遊玉臺陷于淫靡珠英但紀朝士丹陽止録吳人此繇曲學專門何暇兼包衆善使夫大雅君子所以對卷而長嘆也唐興一百七十載屬方隅叛渙戎事紛綸業文之人述作中廢粵若肅宗先帝以殷憂啓聖反正中原伏惟皇帝以出震繼明保安區宇國風雅頌蔚然復興所謂文明御時上以化下者也仲武不揆菲陋輒罄謏聞博訪詞林採察謠俗起自至德元首終於大歷暮年述一作作者數千費本無此句選者二十六人詩總一百三十二二費本四首分為兩卷七言附之略敘品彚人倫命曰中興間氣集且夫微言雖絶大制猶存何云此處疑有脫誤詳其否臧當可擬議古之作者因事造端敷弘體要立義以全其制因文以寄其心著王政之興衰表國風之善否豈其苟悅權右取媚薄俗哉今之所收殆革前弊但使體牀風雅理致淸新觀者易心聽者竦耳則朝野通取一作載格律兼收自鄶以下非所敢隸焉凡百君子幸詳至公一葉一行中上有唐字三行錢起下有十二首三字四行贍下注一作淡六行芟作救下注一作芟齊宋作宋齊八行林疏作雲深十行雅作準十二行後下有生字十五行回下注一作過十七行高下注一作江二葉一行暉作輝二行初字下無見字空格接鑾字四行闕鈔作關七行士下鈔有二三二字十四行盾鈔作質三葉二行二月黃鸝飛上林春城紫禁曉陰陰應倒轉禁作陌鸝作鶯四行對作戴下注一作對六行過溫逸人舊居作送溫逸人詩云垂白無名者何年此陸沉丘園應得性婚嫁不嬰心歲計因山薄霞栖在谷深結廬一作設筵連草色曬藥背松陰觸興雲生岫隨耕鳥下林支頤笑來客頭上有朝簪十一行送下無彈琴二字十二行處作度十三行雪作髮十六行頻作貧十九行看作瞻四葉二行事作幸四行紫氣作仙子五行百花酒滿不見君作百花滿眼不見君六行文作甫下有三首二字評云衆甫詩婉媚綺錯巧用文字工于興喻如不隨淮海變空愧稻粱恩盡陳謝之源又自當舟楫路應濟往來人得諷興之要形容體裁皆如此文流佳士也七行寄興園池鶴上劉相公作詠鶴上興元劉相公九行梁作糧十一行賦字無十二行楫作楫十五行吳下空一字又注得家花斜沙依次用十六行雪作雨遇下注一作過十九行于良史下有二首二字五葉二行望下有長安寄李贊府六字七行溼下注一作林花溼雲作煙十行鄭丹下有二首二字十一行剪作翦十三行薊作蘄十五行明下有孝字十六行謂下注一作為十七行強作壃十九行宗下有文明武德大聖大寧孝皇帝十一字二十行暗下注一作暗忽作又下注一作忽六葉三行李希仲下有二首二字四行李作希仲二字實作質五行前作如飛鳥落作鳥飛斷六行無亹亹二句七行祠作詞八行去作吉佩作珮十一行鈔無二首二字實是一首明本誤作二首十六行落作斷亦無夾注十七行昏下注一作沙場昏入作日下注一作入須作復下注一作須十八行節下注一作義十九行李嘉祐下有八首二字二十行流下有也字七葉二行蓋字無二行章作華四行役作設毛刻作假五行出作生生作出窮極筆力作窮思極筆七行湓作盆作下有時字時字以下鈔本側注九行晚望作晚照更作苦十六行王作楊十八行川下注一作天十九行風下注一作聲看作香毛刻作垂八葉九行送上有奉字端公二字鈔本無州下有幕字十一行聲作啼十二行日作自十三行林下有相字十四行林下注一作驛樹陰送從弟永任饒州録事參軍明本毛本登楚城後為和苗員外秋夜省直鈔本無此詩一官萬里向千溪水宿水行漁浦西日晚長煙高岸一作嶺近天空積雪遠峯低蘆花渚上鴻相叫苦竹叢一作橋邊猿暗啼聞道慈親倚門待一作望到時蘭葉正萋萋九葉一行章八元下有二首二字評云八元嘗於都亭偶題數言蓋激楚之音也會稽嚴維到驛問八元曰爾能從我學詩乎曰能少頃遂發八元已辭家維大異一作賢之遂親指喻數年詞賦擢第如雪晴山脊見沙淺浪痕交此得江山之狀貌矣三行出作去戍下注一作渡四行笑下注一作愧寄都官李郎中明本無此詩舊宅平津邸槐陰抵漢宮鳴騮馳道上見月直廬中白雪歌偏麗靑雲宦早通悠然一逢掖千里恨淸風六行戴叔倫下鈔有二首二字評云叔倫之為人溫雅善舉止無賢與不肖見皆盡心在租庸幕下數年夕口靡怠吏部尚書劉公與祠部員外郎張繼書博訪選材曰揖對賓客如叔倫者一見稱心其詩體格雖不越中然廨宇經山火公田沒海潮亦指事造形其骨稍軟故詩家少之送謝夷甫宰剡縣明本收詩六首鈔本惟此及廣陵送趙主薄自蜀歸二首君去方為縣兵戈尚未銷邑中殘老小亂後少官寮廨宇經山火公田沒海潮到時應變俗新譽滿一作政餘姚十葉七行蜀下有歸絳州覲省五字八行歸下注一作之省作自九行馬作騎下注一作馬十一行皇甫冉下有十三首三字十二行評語前半鈔本云補闕自擢桂禮闈遂為高格往以世遘艱虞避地江外每文章一到朝延而作者變色于詞場為先後推錢為宗伯詩家勝負或逐鹿中原如果熟任霜封籬疏從水度又裛露收新稼迎寒葺舊廬下接又燕知社日辭巢去云云十八行者下有珍奇二字二十行斯下有恨字十一葉六行裴固作許先生又注一作題裴固新園十一行袁作裴十五行蘇作藉至下有兼見寄三字十六行處作歲十七行來作還十二葉二行霄作秋下注一作霄五行回下注一作過七行鈔無一作金三字八行鈔無於字所居字九行事作興霜作寒十行空下注一作遙十二行獨上有和字無陪字十四行鈔無一作處處四字十七行閉閣間作開復關十八行喧作啼靜默作默寂住作駐二十行林作裴南下有幕字十三葉一行緣作違澤作塞二行湓作盆泊處作處泊三行淸作聲何云淸字不通五行汀沙作沙洲七行至下注一作到十行對下注一怍聽十二行獨作自十五行氲氲作氤氲十六行天作仙下注一作天十七行杜誦下有一首二字十八行詩下有平字十九行始終作終始故編之作故編於是集十四葉一行雅作賦舊作近下注一作樓三行颯作瑟四行朱灣下有八首二字五行從事作朱君情下注一作曠辟作徵六行幽作淸下注一作幽洪作弘九行者字無對蘇使君席詠箏柱子在秋夜燕王郎中宅詩前散木今何幸良工不棄捐力微慙一柱材薄仰羣賢但願一作且喜聲相應寧辭迹屢遷知音如見賞雅調為君傳十行無露字中作寒義門云當作賦得寒菊得時字十二行待賞作有分十三行他迭盛作隨秋草十四行奉使設宴戲擲籠籌作韋使君席詠拗籠籌得茲字十五行今日作幸得十九行采采作受采十五葉二行上字下有未開二字瓢作杓六行玉作三按讀書敏求記云朱灣詠三詩凡元板至明時刻本皆誤作詠玉此正可證遵王語七行歌作獻九行董生作仲舒十二行回處作過去過字下注一作回十四行段作遐松下有歌字十四行天生有作天然朽下注一作天生有十六行深作森下注一作深十八行面作半下注一作面生作藏十九行色杳作要似要字下注一作杳十六葉一行韓翃下有七首二字二行韓下有翃字九行南去作南下十二行房下注得間字十五行杳作窅十九行聲作風十七葉一行題蘇許公亭林下注得詩字七行溼下注一作點十行鎖作鑰下注一作鎖十一行色作氣下注一作色事作住下注一作事十四行裏下注一作秋氣在家人作人家掃作指下注一作掃十五行起下注一作潮聲連北起十七行蘇渙下有三首二字十九行盜跖作莊蹻二十行丞下有灌字十八葉一行龍蛇作蛟龍二行變下有體字詩下有十字三行李作連帥下有李公勉三字育作有五行乎作歟著作策下有載字六行列字無八行類此作庶幾乎下有豈字其善作雕蟲九行深戒君子之意作深懲賊子也十行格字無十一行寒暑冬夏易陰陽無停機造化渺莫測作不照大荒北其中有毒龍靈怪人莫測十三行外作內我作哉十六行斷作動下注一作斷十七行邊作旁下注一作邊十九葉一行林樹作空林唐中興間氣集卷下一葉三行郎士元下有十二首三字四行形作刑按當作邢君胄中山人也五行更出作出使六行公作君十一行古下有人字十四行車下注一作輪壠作隴十九行桐葉落行舟下注一作霜葉伴行舟二十行應作生下注一作應二葉一行別鄭礒作鄭礒宅送錢大夫五行作送韋明府之任長沙七行山作天下注一作山鷺作露九行作送彈琴李別駕之任洪州十一行潯作尋十三行東作南十九行隱作隔下注一作隱三葉九行兼作再何云兼字不通十二行常作長十五行春作秦十七行驛下注一作客四葉崔洞下有九首二字六行外甥作諸生九行後作盡十三行忘下注一作長十一行上作山下注一作山二十行日作年下注一作日仍下注一作偏五葉三行員作貞四行久下注一作下五行愛憎作離憂七行送丘二十二作送丘為八行見作是十一行初拜命後酬丘二十二見贈作初拜命酬丘丹二十一見贈十三行傑作愧十五行桐廬下注一作同官十六行晚聚鴉下注一作噪晚鴉十八行卻憶作可惜二十行淸江曲內一絶作同從季卿晴江極目夾注折腰體三字鈔本無六葉一行去浪平作萬里晴片帆作千帆三行張繼下有三首二字七行平下有應將否泰理一問魯諸生二句九行送下有鄒字十一行藩作侯下注一作藩佐作仰薄作為十四行感懷詩在夜宿松江後十六行泊作宿七葉一行遭作度二行之作焉十作九三行甚下有此其二字四行草色加湖緑松聲小雪寒作草色無征路松聲傍逐臣無沙鷗驚小吏二句五行間花落地聽無聲作殘花滿地落無聲殘下注一作間六行之下有微字九行題崔公庭竹作奉和郭參謀題崔令公庭竹十行朦朧作蒙籠十一行紉作細十二行藹藹作靄靄十三行響作暮門作階下注一作門阮巷下注一作湘浦園下注一作朝十五行朱下有放字退下有後字十七行誰作稀下注一作誰十八行花下注一作啼十九行謫至于越亭作作負譴後登干越亭作八葉三行引作取四行數作兩六行陪鄭中丞林園宴作奉陪鄭中丞自宣州解印與子姪宴餘干林園七行心遠下注一作意愜八行低下注一作深巷行人少間門臥柳低九行煙作塵下注一作煙十二行適越下注一作赴敵去作客舟作城十三行渚作苑十五行山作上十六行芬芬作氤氲十七行是作愧十九行送李中丞之襄州作送李中丞歸漢陽別業九葉一行靜下注一作獨立三朝識三行幽居作別業鈔本此首在送嚴士元詩後四行原作源芳草下注一作五行寂寂行下注一作尋閉作掩下注一作閉六行郎作嚴下注一作鄭七行深作寒八行間作殘九行程作情相識作知已下注一作相識日下注一作巳十一行李季蘭下有六首二字十二行然下有也字十三行雌作雄罕有其倫句下有四十九字云嘗與諸賢集烏程縣開元寺知河間劉長卿有陰重之疾