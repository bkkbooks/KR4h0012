body:
  text: 中興間氣集跋渤海髙氏選中興間氣集自序云二十六人詩一百四十首令獨遺鄭常一人共逸八詩不敢妄自訂補或又云孟彦深纂非是元祐戊辰曽氏子泓記予家藏中興間氣集凡三本俱逸五人評語勉爾考訂就梨殊未快也旣從婁東磁肆中獲蠧餘半簏内簡得一舊抄本後又元祐曽氏䟦考覈甚確向所缺張衆父章八元戴叔倫孟雲卿諸評具在獨劉灣無攷始嘅全題玉􅉜不無紕繆殘縑敗素自有綾紋季仁云縱不能讀盡世間好書惟身到處莫放過耳戊辰佛日湖南毛晉記
