front:
  text: 郊則禮義克全忠
  hash: sha256:4c8981bc14c3ac258d398a2128da0c0f739472ea451e46cbb2d907458b43a02a
body:
  text: 孝兼著足可𢎞長名流為後楷式士林語曰前有沈宋後有錢郎奉送劉相公催轉運國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁傳星還去囘池鳳不留唯髙飲水節稍淺别家愁落葉淮邉雨孤山海上秋遥知謝公興微月在髙樓裴廸書齋翫月夜來詩酒興月滿謝公樓影閉重門靜寒生獨樹秋鵲驚隨葉散螢逺入煙流今夕遥天末清暉幾處愁廣徳初見鑾駕出關後愁望愁看秦川色􅃤􅃤雲景晦乾坤暫運行品物遺覆載黄塵漲戎馬紫氣隨龍斾掩泣指闕東日月祅氛外臣心寄逺水潮海去如帶周德更休明天衢佇開泰太子李舍人城中别業與文士逃暑下車失炎暑重門深緑篁宮臣禮嘉客林表開蘭堂兹席興難盡澄罍照墨塲鮮風吹印綬宻坐皆馨香美景惜文㑹清吟遲羽觴東陵晩來好極目趣何長鳥道挂疎雨人家殘夕陽城隅擁歸騎留酌戀瓊芳咏白油帽送客薄質慙加首微隂幸庇身巻舒無定日行止必依人已沐脂膏惠寜辭雨露頻雖同客衣色不染洛陽塵東臯早春寄郎四校書禄微賴學稼嵗起歸衡茅窮逹戀明主畊桑亦近郊夜來霽山雪陽氣動林梢萌蕙暖初吐春鳩鳴欲巢蓬萊時入夢知子憶貧交闕下贈裴舍人二月黄鸝飛上林春城紫禁曉隂隂長樂鐘聲花外盡龍池柳色雨中深陽和不􅄆窮途恨霄漢常懸捧日心獻賦十年猶未遇羞將白髮對華簪過温逸人舊居反眞難合道懐舊仍無弔浮俗漸澆漓斯人誰繼妙聲容在心耳寧覺阻言笑𤣥堂閑幾春拱木齊雲嶠鶴傳若士舞猿得蘇門嘯酹酒片陽微空山想埋照送彈琴李長史赴洪州抱琴為傲吏孤棹復南行幾處秋江水皆添白雪聲佳期來客夢幽思緩王程佐牧無勞問心和政自平宿畢侍御宅交情頻更好子有古人風晤語清霜裏平生苦節同心惟二仲合室乃一瓢空落葉寄秋菊愁雲低夜鴻薄寒燈影外殘漏雨聲中明發南昌去逥看御史驄靜夜酬通上人問疾東林生早􅈵髙枕逺公房大士㸔心後中宵清漏長驚蟬出暗柳微月隱廽廊何事沉疴乆含毫問藥王山中寄時校書蓬萊紫氣温如玉唯予知爾陽春曲别來幾日芳蓀緑百花酒滿不見君青山一望心斷續張衆父三首評載巻首寄興園池鶴上劉相公馴狎經時乆䙰褷短翮存不隨淮海變空愧稻粱恩獨立秋天浄單棲夕露繁欲飛還歛翼詎敢望乘軒送李觀之宣州謁袁中丞賦得三洲渡古渡大江濱西南距要津自當舟楫路應濟徃來人翻浪驚飛鳥囘風起緑蘋君看波上客嵗晩獨􅂷綸送李司直使吳使君方擁傳王事逺辭家震澤逢殘雪新豐遇落花水萍千葉􅄆風柳萬條斜何處看離恨春江無限沙于良史二首侍御詩清雅工於形似如風兼殘雪起河帶斷氷流吟之未終皎然在目冬日野望地際朝陽滿天邉宿霧收風兼殘雪起河帶斷氷流北闕馳心極南圖尚旅逰登臨思不已何處可消憂閑居隱几讀黄老閑齋耳目明僻居人事少多病道心生雨洗山林濕蛙鳴池館晴褰簾暮雲起殘日上髙城鄭丹二首丹詩剪刻婉宻寳厯中獻二帝兩后挽歌三十首詞㫖哀楚得臣子之致雖不及事朝廷嘉之解褐任薊州録事叅軍今選尤者列於此集𤣥宗至道大聖大明皇帝挽歌律厯千年㑹車書萬里同固期常戴日豈謂厭觀風地􅃤新疆理城摧舊戰攻山河寧不壯今夕盡皆空肅宗挽歌國以重明受天從諒闇移諸侯方北面白日忽西馳龍影當泉落鴻名向廟􅂷永言青史上還是載無為李希仲三首李詩輕靡華勝於實此所謂才力不足務為清逸然前軍飛鳥落格鬬塵沙昏亦出塞實録亹亹不絶者可及於中矣東皇太乙祠去日初齋戒靈巫穆上皇焚香布瑶席鳴佩奠椒漿緩舞花飛滿清歌水去長囘波送神曲雲雨過瀟湘薊北行旄頭有精芒胡騎獵秋草羽檄南渡河邊庭用兵早漢家愛征戰宿將今已老辛苦羽林兒從戎榆闗道又一身救邉速烽火連薊門前軍飛鳥落格鬬塵沙昏寒入鼔聲急單于將夜奔當須徇忠節身死報國恩李嘉祐八首袁州自振藻天朝大收芳譽中興髙流於錢郎别為一體往徃渉於齊梁綺靡婉麗盖吳均何遜之敵也如野渡花争發春塘水亂流又朝霞晴作雨濕氣晩生寒文章之冠冕也又禪心超忍辱梵語問多羅假使許詢更出孫綽復生窮極筆力未到此境發湓浦望廬山初晴直省齎勑催赴江隂西望香爐雪千峰晩望新白頭悲作吏黄紙更催人多負登山屐深藏漉酒巾傷心公府内手版日相親送王牧吉州謁使君叔細草緑汀洲王孫耐薄逰年華初冠帶文體舊弓裘野渡花爭發春塘水亂流使君憐小阮應念倚門愁潤州王别駕宅送蔣九侍御収兵歸揚州沴氣清金虎兵威壯鐡冠揚旌川色暝吹角水風寒人對輜軿醉花垂睥睨殘羨歸丞相府空望舊雕欄奉陪韋潤州逰鶴林寺野寺江城近雙旌五馬過禪心超忍辱梵語問多羅松竹閑僧老雲煙晩日和寒塘歸路轉清磬隔微波仲夏江隂官舍寄裴明府萬室邉江次孤城對海安朝霞晴作雨濕氣晩生寒苔色侵衣袂潮痕上井欄題書招茂宰思爾欲辭官送韋員外端公宣慰勸農畢赴洪州聖主臨前殿殷憂遣使臣氣迎天詔喜恩發土膏春草色催歸棹鶯聲為送人龍沙多道里流水日相親登楚城驛路十里山村竹林交暎十里山村道千峰櫟樹林霜濃竹枝亞嵗晩荻花深草市多樵客漁家足水禽幽居雖可羨無奈子牟心和苗員外秋夜省直久雨南宮夜仙郎寓直時漏長丹鳳闕秋老白雲司螢影侵階亂鴻聲出苑遲蕭條人吏散小謝有新詩章八元一首評載巻首新安江行江源南出永野渡暫維梢古戍懸漁網空林露鳥巢雪晴山脊見沙淺浪痕交自笑無媒者逢人即解嘲戴叔倫六首評載巻首攷舊本目録有送夷甫宰鄼縣一詩坊刻不載亦附巻首吳明府自逺而來留宿出門逢故友衣服滿塵埃嵗月不可問山川何處來綺城容敝宅散職寄靈臺自此留君醉相懽得幾迴除夜宿石頭驛旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰髩明日又逢春客夜與故人偶集天秋月又滿城闕夜千重還作江南㑹翻疑夢裏逢風枝驚暗鵲露草覆寒蛩覊旅長堪醉相留畏曉鐘送友人東歸萬里楊柳色出關送故人輕烟拂流水落日照行塵積夢江湖濶憶家兄弟貧徘徊灞亭上不語自傷春别友人擾擾倦行役相逢陳蔡間如何百年内不見一人閒對酒惜餘景問程愁亂山秋風萬里道又出穆陵關廣陵送趙主簿自蜀歸原本目録作送趙主簿自蜀歸絳州覲省將歸汾水上逺省錦城來已泛西江盡仍隨北雁廽暮雲征馬速曉月故關開漸向庭闈近留君醉一杯皇甫冉十三首冉詩巧於文字發調新竒逺出情外然而雲藏神女館雨到楚王宮與閉門白日晩倚杖青山暮及逺山重疊見芳草淺深生岸草知春晩沙禽好夜驚又燕知社日辭巢去菊為重陽冒雨開可以雄視潘張平揖沈謝又巫山詩終篇竒麗自晉宋齊梁陳隋以來採掇者無數而補闕獨獲驪珠使前賢失歩後輩卻立自非天假何以逮斯長轡未騁芳蘭早凋悲夫送王相公赴幽州自昔蕭曹任難兼衛霍功勤勞無逺近旌節屢西東不選三河卒還令萬里通雁行緣古塞馬鬛起長風遮虜關山靜防秋鼓角雄徒思一攀送羸病蓽門中題裴固新園東郭訪先生西郊尋隱路久為江南客自有雲陽樹已得丘園心不知公府歩閉門白日晩倚杖青山暮果熟任霜封籬疎從水渡窮年無牽綴往事惜淪誤惟見耦畊人朝朝自來去酧袁補闕中天寺見寄東林初結社已有晩鐘聲窗户皆流水房廊半架城逺山重疊見芳草淺深生每與君攜手多煩長老迎酧崔侍御期蘇道士不至一心求妙道幾處候真師丹竈今何處白雲無定期崐崘煙景絶汗漫往來遲君但焚香待人間到有時巫山髙御覽集同巫峽見巴東迢迢出半空雲藏神女館雨到楚王宮朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中和袁郎中破賊後經剡中山水武庫分帷幄儒衣事鼔鼙兵連越徼外冦盡海氛西節比全疎勒功當雪㑹稽旌旗逥剡嶺士馬躍耶溪受律梅初發班師草未齊行㸔佩侯印豈得訪丹梯送元晟還歸潛山所居深山秋事早君去復何如裛露收新稼迎霜葺舊廬題詩即招隱作賦是閑居别後空相憶嵇康懶寄書獨孤中丞筵陪餞韋使君赴昇州中司龍節貴上客虎符新地控呉襟帶才髙漢縉紳泛舟應度臘入境便行春何處歌來暮長江建業人同杜相公對山僧作吏散重門掩僧來閉閣閒逺心馳北闕春興寄東山草長風光裏鶯喧静黙間芳晨不可住惆悵暮禽還送林員外往江南分務江南逺留懽幕下榮楓林緣楚澤水驛到湓城㟁草知春晩沙禽好夜驚風㠶幾泊處處䖏暮潮清送李録事赴饒州北人南去雪紛紛㕍叫汀沙不可聞積水長天隨遠道荒城極浦足寒雲山從建業千峰出江至潯陽九𣲖分借問督郵纔弱冠府中年少不如君秋日東郊作閒看秋水心無事臥對寒松手自栽廬岳髙僧留偈别茅山道士寄書來燕知社日辭巢去菊為重陽冒雨開淺薄將何稱獻納臨岐終日獨遲廽少室韋鍊師昇仙歌紅霞紫氣晝氤氲絳節青幢迎少君忽從林下昇天去空使時人禮白雲杜誦一首杜君詩調不失文流如流水生涯盡浮雲世事空得生人始終之理故編之哭長孫侍御道為詩書重名因雅頌雄禮闈曾擢桂憲府屢乘騘流水生涯盡浮雲世事空唯餘舊臺栢蕭颯九原中朱灣七首從事率履貞素放情江湖郡國交辟潛耀不起有唐髙人也詩體幽逺興用洪深因詞寫意窮理盡性於詠物尤工如受氣何曾異開花獨自遲所謂哀而不傷國風之深者也秋夜宴王郎中宅賦得露中菊衆芳春競發寒菊露偏滋受氣何曾異開花獨自遲晩成猶待賞欲採未過時忍棄東籬下看他迭盛衰奉使設宴􅃧擲籠籌今日陪樽爼良籌復在兹獻酬君有禮賞罰我無私莫怪斜相向還將正自持一朝權入手看取令行時詠雙陸骰子采采應緣白鑽心不為名掌中猶可重手下莫言輕有對唯求敵無私直任爭君看一擲後當取擅場聲詠壁上酒瓢呈蕭明府不是難提挈行藏固有期安身未得所開口欲從誰應物心無倦當罏柄㑹持莫將成廢器還有對樽時詠三獻玉屢招疑終朝省復思旣哀黄鳥興還復白圭詩請益先求友將行必擇師誰知不鳴者獨下董生帷送陳偃賦得白鳥翔翠微不知鷗與鶴天畔弄晴暉背日分明見臨川相暎微淨中雲一㸃囘處雪孤飛正好南枝住翩翩何所歸題段上人院壁畵古松石上盤古根謂言天生有安知草木性變在畵師手隂森方文間眞趣幽且閑木紋離披勢槎椊中裂空心火燒出掃成三寸五寸枝便是千年萬年物莓苔濃淡色不同一面死皮生蠧蟲風霜未必來到此氣色杳在寒山中孤標可玩不可取能使支公道場古韓翃七首韓員外詩匠意近於史興致繁富一篇一詠朝士珍之多士之選也如星河秋一雁砧杵夜千家又客衣筒布潤山舍荔枝繁又疎簾看雪捲深户暎花關方之前載芙容出水未足多也其比興深於劉員外筋節成於皇甫冉也送辰州李中丞白羽逐青絲翩翩南去時巴人迎道路蠻帥引旌旗暮雨山開少秋風葉落遲功成冀他日應見竹郎祠題薦福寺衡嶽禪師房春城乞食還髙論此中閑僧臘堦前樹禪心江上山疎簾看雪捲深户暎花關晩送門人出鐘聲杳靄間奉送王相公赴幽州黄閤開帷幄丹墀侍冕旒位髙湯左相權總漢諸侯不改周南化仍分趙北憂雙旌過易水千騎入幽州塞草連天暮邉聲動地秋無因隨逺道結束佩吳鈎題蘇許公林亭平津東閣在别是竹林期萬葉秋聲裏千家落照時門隨深巷靜忩過逺鐘遲客舍苔生處依依又賦詩送孫革及第後歸江南過淮芳草歇千里又東歸野水吳山出家林越鳥飛荷香隨去棹梅雨濕征衣無數滄洲客如君達者稀題僧房披衣聞客至關鎖此時開鳴磬夕陽盡巻簾秋色來名香連竹徑清梵出花臺身在心無住他方到幾囘送太常元博士歸江東渡江秋色裏詩興與歸心客路緣楓㟁家人掃橘林潮聲當晝起山翠近南深幾日華陽洞寒花獨自尋蘇渙三首渙本不平者善放白弩巴中號曰白跖賨人患之以比盗跖後自知非變節從學鄉賦擢第累遷至御史佐湖南幕崔中丞遇􅊣渙遂踰嶺扇動哥舒䟦扈交廣此猶龍蛇見血本質彰矣三年中作變律詩九首上廣州李帥其文意長於諷刺亦有陳拾遺一鱗半甲故善之或曰此子左右嬖臣侵敗王略今著其文可乎答曰漢著蒯通說詞皇史録列祖君彦檄書此大所以容細也夫善惡必書春秋至訓明言不廢孟子格言渙者其殆類此乎但不可棄其善亦以深戒君子之意變律日月東西行寒暑冬夏易隂陽無停機造化𣺌莫測開目為晨光閉目爲夜色一開復一閉明晦無休息居然六合外曠我天地德天地且不言世人浪喧喧又毒蜂一成窠髙挂惡木枝行人百歩外目斷魂亦飛長安大道邊挾弹誰家兒右手持金丸引滿無所疑一中紛下來勢若風雨隨身如萬箭攢宛轉迷所之徒有疾惡心奈何不知幾又養蠶為素絲葉盡蠶不老傾筐對林樹此意向誰道一女不得織萬夫受其寒一夫不得意四海行路難禍亦不在大福亦不在先世路險孟門吾徒當勉旃中興間氣集巻上欽定四庫全書中興間氣集巻下唐髙仲武編郎士元十二首員外河嶽英竒人倫秀異自家形國遂擁大名右丞以往與錢更長自丞相以下更出作牧二公無詩祖餞時論鄙之兩君體調大抵欲同就中郎公稍更閑雅近於康樂如荒城背流水逺雁入寒雲去鳥不知倦逺帆生暮愁又蕭條夜静邉風吹獨倚營門向秋月可以齊衡古人掩暎時輩又暮蟬不可聽落葉豈堪聞古謂謝朓工於發端比之扵今有慙沮矣送楊中丞和蕃錦車登隴日邊草正萋萋舊好隨君長新愁聽鼓鼙河源飛鳥外雪嶺大荒西漢壘今猶在遥知路不迷送奚賈歸吳東南富春樹曾是謝公遊今日奚生去新安江正秋水容清過客楓葉落行舟遥想赤亭下聞猿應夜愁别鄭礒原題鄭礒宅送錢大暮蟬不可聽落葉豈堪聞自是悲秋客那能此路分荒城背流水逺雁入寒雲陶令東籬菊餘花可贈君送長沙韋明府之縣秋入長沙縣蕭條旅宦心煙波連桂水官舍暎楓林雲日楚山暮沙汀白鷺深遥知訟堂裏佳政在鳴琴送洪州李别駕之任南去秋江逺孤舟興自多能將流水引更入洞庭波夏口帆初上潯陽雁正過知音在霄漢佐郡豈蹉跎送裴補闕入河東幕皎然青瑣客何事動行軒苦節酬知已清吟去掖垣秋城臨海樹寒月上營門鄒魯詩書地應無鼙鼓喧春日宴張舍人宅懶尋芳草徑來接侍臣筵山色知殘雨墻隂覺暮天鶯歸漢宮柳花隱杜陵煙地與東城接春光醉目前送陸員外赴潮州含香臺上客剖竹海邉州楚驛多歸信閩溪足亂流今朝永嘉後重見謝公遊送王棼流雷州昨日三峰尉今朝萬里人平生任孤直豈是不防身海霧多為瘴山雷乍作鄰遥憐北窗月與子獨相親題劉相公三湘圖昔嵗别衡霍邇來憶南州今朝平津邸兼得瀟湘逰稍辨郢門樹依然芳杜洲微明三巴峽咫尺萬里流去鳥不知倦逺帆生暮愁涔陽指天末北渚空悠悠枕上見漁父坐中常狎鷗誰言魏闕下自有東山幽送孫侍郎往容府宣慰春原獨立望湘川擊隼南飛上楚天奉詔不言空問俗清時因得訪遺賢荆門晩色兼梅雨桂水春風過客船疇昔嘗聞陸賈說故人今日豈徒然塞下曲寳刀塞下兒輕身百戰曾百勝壯心竟未嫖姚知白草山頭日初沒黄沙戍下悲笳發蕭條靜夜邉風吹獨倚營門向秋月崔峒九首崔拾遺文彩炳然意思大雅如清磬度山翠閑雲來竹房又流水聲中視公事寒山影裡見人家斯亦披沙揀金往徃見寳春日憶姚氏外甥離亂人相失春秋雁自飛秪緣行路逺未必寄書稀二月花無數頻年意有違落暉看過後獨坐淚沾衣題崇福寺禪師院僧家竟何事埽地與焚香清磬度山翠閑雲來竹房身心塵外逺嵗月坐中忘向晩禪堂掩無人空夕陽江上書懐骨肉天涯别江山日落時淚流襟上血􅄠變鏡中絲胡越書難到存亡夢豈知登髙囘首罷形影自相隨送薛良友往越州謁從叔辭家日已乆與子分仍深易得思鄉淚難為欲别心孤雲隨浦口幾日到山隂遥想蘭亭下清風滿竹林送眞上人還蘭若得道雲林乆年深暫一歸出山逢世亂乞食覺人稀半偈初傳法中峰又掩扉愛憎應不染塵俗自依依送丘二十二歸蘇州積水與寒煙嘉禾路幾千孤猿鳴海嶠群雁起湖田曾見長洲苑嘗聞大雅篇却將封事去知爾得閑眠初拜命後酬丘二十二見贈江海乆垂綸朝衣忽挂身丹墀方謁帝白髮免羞人才愧文章士名當諫諍臣空餘薦賢分不敢負交親題桐廬李明府官舍訟堂寂寂對煙霞五柳門前晩聚鵶流水聲中視公事寒山影裡見人家移風共美新為政計日還知更觸邪却憶陶潛無限酒不逢籬菊正開花清江曲内一絶折腰體八月江水去浪平片帆一道帶風輕極目不分天水色南山南是岳陽城張繼三首員外累代詞伯積襲弓裘其於為文不雕不飾及爾登第秀發當時詩體清逈有道者風如女停襄邑杼農廢汶陽畊可謂事理雙切又火燎原猶熱風摇海未平比興深矣送判官往陳留齊宋分廵地頻年此用兵女停襄邑杼農廢汶陽畊使者乗軺去諸藩擁節迎深仁佐君子薄賦䘏黎甿火燎原猶熱風摇海未平應將否泰理一問魯諸生感懐調與時人背心將靜者論終年帝城裡不識五侯門夜泊松江原題楓橋夜泊月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船劉長卿九首長卿有吏幹剛而犯上兩遭遷謫皆自取之詩體雖不新竒甚能鍊飾大抵十首已上語意稍同扵落句尤甚思銳才窄也如草色加湖緑松聲小雪寒又沙鷗驚小吏湖色上髙枝又細雨濕衣看不見閑花落地聽無聲截長補短盖絲之類歟其得罪風霜苦全生天地仁可謂傷而不怨亦足以發揮風雅矣題崔公庭竹不學媚清瀾能依上將壇朦朧低冕過青翠捲簾㸔得地移根逺經霜抱節難紉花成􅃫實嫩笋長漁竿藹藹軍容靜蕭蕭郡宇寛細音和角響疎影上門寒阮巷何人在梁園幾處殘空餘軒屏側嵗晩對任安送朱山人越州賊退歸山隂别業越中初戰罷江上送歸橈南渡無來客西陵自落潮空城垂故柳舊業廢春苗閭里誰相見鶯花共寂寥謫居于越亭作天南愁望絶亭上栁條新落日獨歸鳥孤舟何處人生涯投嶺徼世業陷邊塵江入千峰暮花迎百越春秦臺憐白首楚水怨青蘋草色迷征路鶯聲傍逐臣獨醒翻引笑直道不容身得罪風霜苦全生天地仁青山数行淚滄海一窮鱗牢落機心盡空憐鷗鳥親陪鄭中丞林園宴心逺親魚鳥功成厭鼓鼙林中阮家醉池上謝公題門徑蒼苔合窗隂綠篠低夕陽山向背秋草水東西舊架懸藤老疎籬挿槿齊風煙不可到誰羡武陵溪送張繼司直適越時危身適越事往任浮沉萬里江山去孤舟百戰心春風吳渚綠古木剡山深明日滄洲路歸雲不可尋送駱三少府西山應制汀洲芳草綠日暮更紛紛舊國無來信春江獨送君五言凌白雪六翮向青雲自是無機者沙鷗已可羣送李中丞之襄州流落征南將曾驅十萬師罷歸無舊業老去戀明時獨立三邊靜輕生一劍知茫茫漢江上日暮欲何之題鄭山人幽居一作寂寂孤鶯啼杏園寥寥一犬吠桃源白首深藏谷口村春山犬吠武陵源落花芳草無行處萬壑千峰獨閉門送郎士元春風倚棹闔閭城水國春深隂復晴細雨濕衣看不見閑花落地聽無聲日斜江上孤帆影草緑湖南萬里程東道若逢相識問青袍今已誤儒生李季蘭六首士有百行女唯四德季蘭則不然形氣既雌詩意亦蕩自鮑昭以下罕有其倫如逺水浮仙棹寒星伴使車盖五言之佳境也上倣班姬則不足下比韓英則有餘不以遲暮亦一俊嫗湖上臥病喜陸鴻漸至昔去繁霜月今來苦霧時相逢仍卧病欲語淚先垂强勸陶家酒還吟謝客詩偶然成一醉此外更何之寄校書七兄無事烏程縣蹉跎嵗月餘不知芸閣吏寂寞竟何如逺水浮仙棹寒星伴使車因過大雷岸莫忘幾行書寄朱放望水試登山山髙湖又濶相思無曉夕相望經年月鬱鬱山木榮綿綿野花發别後無限情相逢一時說送韓揆之江西相看指楊柳别恨轉依依萬里江西水孤舟何處歸湓城潮不到夏口信應稀唯有衡陽雁年年來去飛道意寄崔侍郎莫漫戀浮名應須薄宦情百年齊旦暮前事盡虚盈愁鬢行看白童顔學未成無過天竺國依止古先生賦得三峽流泉歌妾家本住巫山雲巫山流泉常自聞玉琴奏出轉寥夐直似當年夢裡聽三峽迢迢幾千里一時流入幽閨裏巨石崩嵓指下生飛泉走浪絃中起初疑憤怒含雷風又似嗚咽流不通囘湍曲瀨勢將盡時復滴瀝平沙中憶昔阮公為此曲能令仲容聽不足一彈既罷還一彈願似流泉鎮相續竇叅三首竇君詩亦祖沈千運比於孟雲卿尚在廊廡間如萬丈水聲落四時松色寒又人生年幾齊憂苦亦先老雖其羽翼未齊而筋骨已具閒居湖上避影將息隂自然知音稀向來深林中偶亦有所窺飛鳥口銜食引雛上髙枝但各子其子寜知宜不宜止止復何言物情方可知登潛山觀山勢欲相抱一條微徑盤攀蘿歇復行始得凌仙壇聞道葛夫子此中鍊還丹丹成五色光服之生羽翰靈草空自翠餘霞誰復餐至今歩虗處猶有孤飛鸞幽幽古殿門下壓浮雲端萬丈水聲落四時松色寒既入無何鄉轉嫌人事難終當逺塵俗髙卧從所安遷謫江表乆未歸一自經放逐徘徊無所從便為寒山雲不得隨飛龍名豈不欲保歸豈不欲早苦無三月資逺適萬里道離心與羈思終日苦草草人生年幾齊憂苦亦先老誰能假羽翼使我暢懐抱道人靈一四首自齊梁以來道人工文多矣罕有入其流者一公乃能刻意精妙與士大夫更唱迭和不其偉歟如泉涌堦前地雲生户外峰則道猷寳月曾何及此酬皇甫冉赴無錫於雲門寺贈詩别湖南通古寺來徃意無涯欲識雲門路千峰到若耶春山子猷宅古木謝敷家自可長偕隱那云相去賒宿靈洞觀石室因投宿仙翁幸見容花源隔水見洞府過山逢泉涌瑎前地雲生户外峰中宵自入定非是欲降龍靜林寺即武帝未遇時隠居之所有鐘磬皆古物時時有聲靜林溪路逺蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三世火樹老萬株松無數煙霞色空聞昔卧龍雨後欲尋天目山問元駱二公溪路昨夜雲生天井東春山一雨幾囘風林花倂逐溪流下欲上龍池通不通姚倫二首姚子詩雖未𢎞深去凡已逺屬辭比事不失文流如亂聲千葉下寒影一巢孤篇什之秀也感秋林試向東林望方悲節候殊亂聲千葉下寒影一巢孤不蔽秋天雁驚飛夜月烏霜風與春日幾度遣榮枯過章秀才客舍達人心自適旅舍當閑居不出來時徑重看讀了書晩山嵐色近斜日樹隂疎盡是忘言客聽君誦子虚皇甫曾五首昔孟陽之與景陽詩德逺慙厥弟協居上品載處下流今侍御之與補􅇅文辭亦爾體製清潔華不勝文然寒生五湖道春及萬年枝五言之選也其為士林所尚宜哉送雲門邕上人春山臨一室獨坐草萋萋身寂心成道花閑鳥自啼細泉松逕裡返照竹林西晩與門人别依依出虎溪送林中丞還亰戰罷囘龍節朝天見􅃫池寒生五湖道春及萬年枝召化多遺愛胡清已畏知懐恩多感别墜淚向旌旗贈别筌公一作贈鑒上人龕龍來逺國一作寳龕經末劫律儀傳教誘僧臘老煙霄樹色依禪誦泉聲入寂寥龕龍來逺國畵壁見南朝深户風開合寒泉月對摇息心居靜理愛道坐中宵更欲尋真去乘船泛海潮送杜中丞還亰上將還專席雙旌復出秦關河三晉路賔從五原人孤戍雲連海平沙雪度春酬恩㸔玉劒何處有煙塵早朝日寄所知長安雪後見歸鴻紫禁朝天拜舞同曙色漸分雙闕下漏聲遥在百花中爐烟乍起開仙仗玉佩成行引上公共荷發生同雨露不應黄葉久從風孟雲卿四首評載巻首鄴城懐古朝發淇水南將尋北燕路魏家舊城闕寥落無人住伊昔天地屯曹公獨中據群臣將北面白日忽西暮三臺竟寂寥萬世難長固雄豪安在哉衰草霑霜露崔嵬長河北尚見應劉墓古樹藏龍蛇荒茅伏狐兎永懐故池館數子連章句逸興驅山河雄詞變雲霧我行覩遺跡精爽如相遇斗酒將酧君悲風白楊樹傷情為長心易憂早孤意常傷出門先躊躇入户亦彷徨此生一何苦前事安可忘兄弟先我沒孤幼盈我傍舊居近東南河水新為梁松栢今在兹安忍思故鄉四時與日月萬物各有常秋風已一起草木無不霜行行當自勉不忍再思量傷時原題宋郊徘徊宋郊上不見平生親獨立正傷心悲風來孟津大方載羣物生死有常倫虎豹不相食哀哉人食人豈伊逢世運天道亮云云又太空流素月三五何明眀光耀侵白日賢愚迷至精四時更變化天道有虧盈常恐今夜􅃿須臾還復生西蜀劉灣四首出塞曲將軍在重圍音信絶不通羽書如流星飛入甘泉宮倚是并州兒少年心膽雄一朝隨召募百戰爭王公去年桑乾北今年桑乾東死是征人死功是將軍功汗馬牧秋月疲卒卧霜風仍聞左賢王更欲圍雲中虹縣嚴孝子墓至性教不及因心天所資禮聞三年喪汝獨終身期下布骨肉恩上報父母慈禮聞哭有卒汝獨哀無時前有松栢林荆棘結蒙籠墓門白日閉泣血黄泉中草服蔽枯骨垢容載飛蓬舉聲哭蒼天萬木皆悲風李陵别蘇武漢武愛邊功李陵提步卒轉戰單于庭身隨漢軍􅃿李陵不愛死心存歸漢闕誓欲還國恩不為匈奴屈身辱家已無長居狼虎窟胡天無春風虜地多積雪窮隂愁殺人况與蘇武别發聲天地哀執手肺腸絶白日為我愁隂雲為我結生為漢宮臣死為胡地骨萬里長相思終身望南月雲南曲百蠻亂南方羣盗如蝟起騷然疲中原征戰從此始白門大和城來徃一萬里去者無全生十人九人死代馬卧陽山燕兵哭濾水妻行求死夫父行求死子蒼天滿愁雲白骨積空壘哀哀雲南行十萬同已矣張南史張君奕碁者中歳感激苦節學文數載間稍入詩境如已被秋風敎憶鱠更聞寒雨勸飛觴可謂物理俱美情致兼深送朱文北逰嵗暮欲為别江湖聊自寛且無人事戀誰謂客行難郢曲憐公子吳州憶伯鸞蒼蒼逺山際松栢獨宜寒陸勝宅秋雨中探韻同作同人永日自相將深竹閑園偶辟疆已被秋風教憶鱠更聞寒雨勸飛觴歸心莫問三江水旅服徒沾九日霜醉裏欲尋騎馬路蕭條幾處有垂楊送司空十四逰宋州九拒危城下蕭條送爾歸寒風聞畵角暮雪犯征衣道里猶成間親朋重與違白雲愁欲斷看入大梁飛中興間氣集巻下
