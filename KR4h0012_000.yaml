front:
  text: 中興間氣集卷上
  hash: sha256:2a15c32f589db8bc7c17b72eab06c2e29058375f376176b21ba77c68d5113ab0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0012_SBCK_000-1a}
body:
  text: 渤海高仲武集錢起貟外詩體格新竒理致清贍越從登第挺冠詞林文宗右丞許以高格右丞沒後貟外為雄芟齊宋之浮游削梁陳之靡嫚迥然獨立莫之與羣且如鳥道挂踈雨人家􅋊夕陽又牛羊上山小烟火隔林踈又長樂鐘聲花外盡龍池栁色雨中深皆特出意表標雅古今又窮逹戀明主耕桑亦近郊則禮義克全忠孝兼著足可弘長名流為後楷式士林語曰前有沈宋後有錢郎奉送劉相公催轉運國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁傳星還去回池鳳不留唯高飮冰節稍淺别家愁落葉淮邊雨孤山海上秋遙知謝公興微月在高樓裴迪書齊玩月之作夜來詩酒興月上謝公樓影閉重門靜寒生獨樹秋鵲驚隨月散螢遠入烟流今夕遙天末清暉幾處愁廣德初見鑾駕出關後愁望之作愁看秦川色慘慘雲景晦乾坤暫運行品物遺覆載黃塵漲戎馬紫氣隨龍斾掩泣指闕東日月祅氛外臣心寄逺水潮海去如帶周德更休明天衢佇開泰太子李舍人城中別業與文士逃暑下車失炎暑重門深緑篁宫臣禮嘉客林表開蘭堂兹席興難盡澄罍照墨場鮮風吹印綬密坐皆馨香美景惜文㑹清吟遲羽觴東陵晚來好極目趣何長鳥道挂踈雨人家殘夕陽城隅擁歸騎留酌戀瓊芳咏白油帽送客薄盾慙加首微隂幸庇身卷舒無定日行止必依人巳沭脂膏惠寧辭雨露頻雖同客衣色不染洛陽塵東臯早春寄郎四校書祿微賴學稼歲起歸衡苑窮逹戀明主耕桑亦近郊夜來霽山雪陽氣動林梢萌蕙暖初吐春鳩鳴欲巢蓬萊時入夢知子憶貧交闕下贈裴舍人二月黃鸝飛上林春城紫禁曉隂隂長樂鐘聲花外盡龍池栁色雨中深陽和不散窮途恨霄漢常懸捧日心獻賦十年猶未遇羞將白髮對華簮過溫逸人舊居反真難合道懷舊仍無弔浮俗漸澆淳斯人誰繼妙聲容心在耳寧覺阻言笑玄堂間幾春拱木齊雲嶠鶴傳若士舞猿得蘇門嘯酹酒片陽微空山想埋照送彈琴李長史赴洪州抱琴為傲吏孤棹復南行幾處秋江水皆添白雪聲佳期來客夢幽思緩王程佐牧無勞問心和政自平宿畢侍御宅交情頻更好子有古人風晤語清霜裏平生苦節同心惟二仲合室乃一瓢空落葉寄秋菊愁雲低夜鴻薄寒燈影外􅋊漏雨聲中眀發南昌去回看御史􅍡靜夜酬通上人問疾東林生早涼高枕逺公房大士看心後中宵清漏長驚蟬出暗栁微月隱回廊何事沉痾久含毫問藥王山中寄時校書蓬萊紫氣溫如玉唯豫知爾陽春曲别來幾日芳蓀緑百花酒滿不見君青山一望心斷續張衆文寄興園池鶴上劉相公馴狎經時久㰚樅短翮存不隨淮海變空愧稻梁恩獨立秋天靜單栖夕露繁欲飛還斂翼詎敢望乘軒送李觀之宣州謁袁中丞賦得三洲渡古渡大江濵西南距要津自當舟楫路應濟往來人翻浪驚飛鳥回風起緑蘋君看波上客歲晚獨垂綸送李司直使吳使君方擁傳王事逺辭家震澤逢􅋊雪新豐遇落花一遇字作過水萍千葉散風栁萬條斜何處看離恨春江無限沙于良史侍御詩清雅工於形似如風兼􅋊雪起河帶斷氷流吟之未終皎然在目冬日野望地際朝陽滿天邊宿霧收風兼􅋊雪起河帶斷氷流北闕馳心極南圖尚旅遊登臨思不巳何處可消憂間居隱几讀黃老間齊耳目明僻居人事少多病道心生雨洗山林濕蛙鳴池館晴褰簾暮雲起􅋊日上高城鄭丹丹詩剪刻婉密寶曆中獻二帝兩后挽歌三十首詞㫖哀楚得臣子之致雖不及事朝廷嘉之解褐任薊州録事參軍今選尤者列于此集玄宗至道大聖大明皇帝挽歌律曆千年㑹車書萬里同固期常戴日豈謂厭觀風地慘新疆理城摧舊戰攻山河寧不壯今夕盡皆空夕一作昔肅宗挽歌國以重明受天從諒暗移諸侯方北靣白日忽西馳龍影當泉落鴻名向廟垂永言青史上還是載無為李希仲李詩輕靡華勝於實此所謂才力不足務為清逸然前軍飛鳥落格鬪塵沙昏亦出塞實録亹亹不絶者可及于中矣東皇太一祠去日𥘉齊戒靈巫穆上皇焚香布瑤席鳴佩奠椒漿緩舞花飛滿清歌水去長回波送神曲雲雨過瀟湘薊北行二首旄頭有精芒胡騎獵秋草羽檄南渡河邊庭用兵早漢家愛征戰宿將今巳老辛苦羽林兒從戎榆關道其二一身救邊速烽火連薊門前軍飛鳥落一作斷格鬪塵沙昏寒入鼓聲急單于將夜奔當須徇忠節身死報國恩李嘉祐袁州自振藻天朝大收芳譽中興高流與錢郎别為一體往往涉于齊梁綺靡婉麗蓋吳均何遜之敵也如野渡花爭發春塘水亂流又朝霞晴作雨濕氣晚生寒文章之冠冕也又禪心超忍辱𣑽語問多羅役使許詢更出孫綽復生窮極筆力未到此境發湓浦望山作𥘉晴直省賫勑催赴江隂西望香爐雪千峰晚望新白頭悲作吏黃𥿄更催人多負登山屐深藏漉酒巾傷心公府內手版日相親送王牧吉州謁使君叔細草緑汀洲王孫耐薄遊年華𥘉冠帶文體舊弓裘野渡花爭發春塘水亂流使君憐小阮應念倚門愁潤州王别駕宅送蔣九侍御收兵歸揚州沴氣清金虎兵威壯鐵冠揚旌川色暝吹角水風寒人對輜軿醉花看睥睨􅋊羡歸丞相府空望舊雕欄奉陪韋潤州遊鶴林寺野寺江城近雙旌五馬過禪心超忍辱𣑽語問多羅松竹間僧老雲烟晚日和寒塘歸路轉清磬隔微波仲夏江隂官舍寄裴明府萬室邊江次孤城對海安朝霞晴作雨濕氣晚生寒苔色侵衣𬒮潮痕上井欄題書招茂宰思爾欲辭官送韋貟外端公宣慰勸農畢赴洪州聖主臨前殿殷憂遣使臣氣迎天詔喜恩發土膏春草色催歸棹鶯聲為送人龍沙多道里流水日相親登楚城驛路十里村竹林次交映十里山村道千峰櫟樹林霜濃竹枝亞歲晚荻花深草市多樵客漁家足木禽幽居雖可羡無那子牟心和苗貟外秋夜省直久雨南宫夜仙郎寓直時漏長丹鳳闕秋老白雲司螢影侵階亂鴻聲出苑遲蕭條人吏散小謝有新詩章八元新安江行江源南出永野飯暫維梢古戍懸魚網空林露鳥巢雪晴山脊見沙淺浪痕交自笑無媒者逢人作解嘲戴叔倫吳明府自逺而來留宿出門逢故友衣服滿塵埃歲月不可問山川何處來綺城容敝宅散職寄靈臺自此留君醉相歡得幾回除夜宿石頭驛旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰鬢明日又逢春客夜與故人偶集天秋月又滿城闕夜千重還作江南㑹翻疑夢裏逢風枝驚暗鵲露草覆寒蛩羈旅長堪醉相留畏曉鐘送友人東歸萬里楊栁色出關送故人輕烟拂流水落日照行塵積夢江湖闊憶家兄弟貧徘徊灞亭上不語自傷春别友人擾擾倦行役相逢陳蔡間如何百年內不見一人間對酒惜餘景問程愁亂山秋風萬里道又出穆陵關廣陵送趙主簿自蜀歸將歸汾水上逺省錦城來已泛西江盡仍隨北雁回暮雲征馬速曉月故關開漸向庭闈近留君醉一杯皇甫冉冉詩巧於文字發調新竒逺出情外然而雲藏神女館雨到楚王宫與閉門白日晚倚杖青山暮及逺山重疊見芳草淺深生岸草知春晚沙禽好夜驚又燕知社日辭巢去菊為重陽冒雨開可以雄視潘張平揖沈謝又巫山詩終篇竒麗自晉宋齊梁陳隋以來採掇者無數而𥙷闕獨獲驪珠使前賢失步後輩郤立自非天假何以逮斯長轡未騁芳蘭早凋悲夫送王相公赴幽州自昔蕭曹任難兼衛霍功勤勞無遠近旌節屢西東不選三河卒還令萬里通雁行緣古塞馬鬛起長風遮虜關山靜防秋鼓角雄徒思一攀送羸病蓽門中題裴固新園東郭訪先生西郊尋隱路久為江南客自有雲陽樹巳得丘園心不知公府步閉門白日晚倚杖靑山暮果熟任霜封籬踈從水渡窮年無牽綴往事惜淪誤惟見耦耕人朝朝自來去酬袁𥙷闕中天寺見寄東林𥘉結社已有晚鐘聲囱戶皆流水房廊半架城逺山重疊見芳草淺深生每與君攜手多煩長老迎酬崔侍御期蘇道士不至一心求妙道幾處候真師丹竈今何處白雲無定期崑崙烟景絶汗漫往來遲君但焚香待人間到有時巫山高巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九霄中霄一作秋和袁郎中破賊後經剡中山水武庫分帷幄儒衣事鼓鼙兵連越徼外寇盡海氛一作門西節比全踈勒功當雪㑹稽旌旗回剡嶺士馬濯耶溪受律梅𥘉發班師草未齊行看佩侯一作金印豈得訪丹梯送元晟還於潜山所居深山秋事早君去復何如裛露收新稼迎霜葺舊廬題詩即招隱作賦是間居別後空相憶嵇康懶寄書獨孤中丞筵陪餞韋使君赴升州中司龍節貴上客虎符新地控吳襟帶才高漢縉紳泛舟應度臘入境便行春何處一作處處歌來暮長江建業人同杜相公對山僧作吏散重門掩僧來閉閣閒逺心馳北闕春興寄東山草長風光裏鶯喧靜默間芳晨不可住惆悵暮禽還送林貟外往江南分務江南逺留歡幕下榮楓林緣楚澤水驛到湓城岸草知春晚沙禽好夜驚風帆幾泊處處處暮潮清送李録事赴饒州北人南去雪紛紛雁呌汀沙不可聞積水長天隨逺道荒城極浦足寒雲山從建業千峰出江至潯陽九派分借問督郵才弱冠府中年少不如君秋日東郊作閒看秋水心無事臥對寒松手自栽廬嶽高僧留偈别茅山道士寄書來燕知社日辭巢去菊為重陽冒雨開淺薄將何稱獻納臨𡵨終日獨遲回少室韋鍊師升仙歌紅霞紫氣晝氲氲絳節靑幢迎少君忽從林下升天去空使時人禮白雲杜誦杜君詩調不失如流水生涯盡浮雲丗事空得生人始終之理故編之哭長孫侍御道為詩書重名因雅頌雄禮闈曾擢桂憲府舊乘驄流水生涯盡浮雲世事空唯餘舊臺柏蕭颯九原中朱灣從事率履正素放情江湖郡國交辟潜躍不起有唐高人也詩體幽逺興用洪深因詞寫意窮理盡性於詠物尤工如受氣何曾異開花獨自遲所謂哀而不傷國風之深者也秋夜燕王郎中宅賦得露中菊衆芳春競發寒菊露偏滋受氣何曾異開花獨自遲晚成猶待賞欲采未過時忍棄東籬下看他迭盛衰奉使設宴戲擲籠籌今日陪樽爼良籌復在茲獻酬君有禮賞罰我無私莫怪斜相向還將正自持一朝權入手看取令行時詠雙陸頭子采采應緣白鑽心不為名掌中猶可重手下莫言輕有對唯求敵無私直任爭君看一擲後當取擅場聲詠壁上酒瓢呈蕭明府不是難提挈行藏固有期安身未得所開口欲從誰應物心無倦當壚柄㑹持莫將成廢器還有對樽時詠玉歌玉屢招疑終朝省復思既哀黃鳥興還復白圭詩請益先求友將行必擇師誰知不鳴者獨下董生帷送陳偃賦得白鳥翔翠微不知鷗與鶴天畔弄晴暉背日分明見臨川相映微淨中雲一點回處雪孤飛正好南枝住翩翩何所歸題假上人院璧畫古松石上盤古根謂言天生有安知草木性變在畫師手隂深方丈間真趣幽且間木紋離披勢槎枿中裂空心火燒出掃成三寸五寸扶便是千年萬年物莓苔濃淡色不同一靣一作半死皮生蠧蟲風霜未必來到此氣色杳在寒山中孤標可玩不可取能使支公道場古韓翃韓貟外詩匠意近於史興致繁冨一篇一詠朝士珍之多士之選也如星河秋一雁砧杵夜千家又客衣筒布潤山舍荔支繁又踈簾看雪捲深戶映花關方之前載芙蓉出水未足多也其比興深於劉貟外筋節成於皇甫冉也送辰州李中丞白羽逐青絲翩翩南去時巴人迎道路蠻帥引旌旗暮雨山開少秋風葉落遲功成兾他日應見竹郎祠題薦福寺衡嶽禪師房春城乞食還高論此中間僧臘階前樹禪心江上山踈簾看雪捲深戶映花關晚送門人出鐘聲杳靄間奉送王相公赴幽州黃閣開帷幄丹墀侍冕旒位高湯左相權揔漢諸侯不改周南化仍分趙北憂雙旌過易水千騎入幽州塞草連天暮邊風動地秋無因陪逺道結束佩吳鈎題蘇許公林亭平津東閣在别是竹林期萬葉秋聲裏千家落照時門隨深巷靜囱過遠鐘遲客住苔生處依然又賦詩送孫革及第後歸江南過淮芳草歇千里又東歸野水吳山出家林越鳥飛荷香隨去棹梅雨濕征衣無數滄洲客如君逹者稀題僧房披衣聞客至關鎖此時開鳴磬夕陽盡卷簾秋色來名香連竹徑清𣑽出花臺身在心無事一作住他方到幾回送太常元博士歸潤州渡江秋色裏詩興與歸心客路緣楓岸家人掃橘林潮聲當晝起山翠近南深幾日華陽洞寒花獨自尋蘇渙渙本不平者善放白弩巴中號曰白跖賨人患之以比盜跖後自知非變節從學鄉賦擢第纍遷至御史佐湖南幕崖中丞遇害渙遂踰嶺扇動哥舒跋扈交廣此猶龍蛇見血本質彰矣三年中作變律詩九首上廣州李帥其文意長於諷刺亦育陳拾遺一鱗半甲故善之或曰此子左右嬖臣侵敗王略今著其文可乎答曰漢著蒯通說詞皇史録列祖君彥檄書此大所以容細也夫善惡必書春秋至訓明言不廢孟子格言渙者其殆類此乎但不可弃其善亦以深戒君子之意變律格詩日月東西行寒暑冬夏易隂陽無停機造化渺莫測開目為晨光閉目為夜色一開復一閉明晦無休息居然六合外曠我天地德天地且不言世人浪喧喧同前毒蜂一成窠高挂惡木枝行人百步外目斷魂亦飛長安大道邊挾彈誰家兒右手持金丸引滿無所疑一中紛下來勢若風雨隨身如萬箭攢宛轉迷所之徒有疾惡心奈何不知幾同前養蠶為素絲葉盡蠶不老傾筐對林樹此意向誰道一女不得織萬夫受其寒一夫不得意四海行路難禍亦不在大福亦不在先丗路險孟門吾從當勉旃中興間氣集卷之上中興間氣集卷之下渤海高仲武集郎士元貟外河嶽英竒人倫秀異自家形國遂擁大名右丞以往與錢更長自丞相巳下更出作牧二公無詩祖餞時論鄙之兩君體調大抵欲同就中郎公稍更間雅近於康樂如荒城背流水逺雁入寒雲去鳥不知倦逺帆生暮愁又蕭條夜靜邊風吹獨倚營門向秋月可以齊衡古人掩映時輩又暮蟬不可聽落葉豈堪聞古謂謝眺工於發端比之於今有慚沮矣送楊中丞和蕃錦車登壠日邊草正萋萋舊好隨君長新愁聽鼓鼙河源飛鳥外雪嶺大荒西漢壘今猶在遙知路不迷送奚賈歸吳東南富春渚曾是謝公遊今日奚生去新安江正秋水容清過客楓葉落行舟遙想赤亭下聞猿應夜愁别鄭礒暮蟬不可聽落葉豈堪聞自是悲秋客那能此路分荒城背流水逺雁入寒雲陶令東籬菊餘花可贈君送長沙韋明府之縣秋入長沙縣蕭條旅宦心烟波連桂水官舍映楓林雲日楚山暮沙汀白鷺深遙知訟堂裏佳政在鳴琴送洪州李別駕之任南去秋江逺孤舟興自多能將流水引更入㓊庭波夏口帆𥘉上潯陽雁正過知音在霄漢佐郡豈蹉跎送裴𥙷闕入河東幕皎然青瑣客何事動行軒苦節酬知巳清吟去掖垣秋城臨海樹寒月上營門鄒魯詩書地應無鼙鼓喧春日宴張舍人宅懶尋芳草徑來接侍臣筵山色知殘雨牆隂覺暮天鶯歸漢宫栁花隱杜陵烟地與東城接春光醉目前送陸貟外赴潮州含香臺上客剖竹海邊州楚驛多歸信閩溪足亂流今朝永嘉後重見謝公遊送王棼流雷州昨日三峰尉今朝萬里人平生任孤直豈是不防身海霧多為瘴山雷乍作鄰遙憐北囱月與子獨相親題劉相公三湘圖昔歲别衡霍邇來憶南州今朝平津邸兼得瀟湘遊稍辨郢門樹依然芳杜洲微明一作月三巴峽咫尺萬里流去鳥不知倦逺帆生暮愁涔陽指天末北渚空悠悠枕上見漁父坐中常狎鷗誰言魏闕下自有東山幽送孫侍郎往容府宣慰春原獨立望湘川擊隼南飛上楚天奉詔不言空問俗清時因得訪遺賢荆門晚色兼梅雨桂水春風過驛船疇昔嘗聞陸賈說故人今日豈徒然塞下曲寶刀塞上兒身經百戰曾百勝壯心竟末嫖姚知百車山頭日𥘉沒黃沙戍下悲歌發蕭條夜靜邊風吹獨倚營門向秋月崔峒崔拾遺文彩炳然意思方雅如清磬渡山翠間雲來竹房又流水聲中視公事寒山影裏見人家斯亦披沙㨂金往往見寶春日憶姚氏外甥離亂人相失春秋雁自飛秪緣行路逺未必寄書希二月花無數頻年意有違落暉看過後獨坐淚沾衣題崇福寺禪師院僧家竟何事掃地與焚香清磬渡山翠間雲來竹房身心塵外逺歲月坐中忘向晚禪堂掩無人空夕陽江上書懷骨肉天涯別江山日落時淚流襟上血髮變鏡中絲胡越書難到存亡夢豈知登高回首罷形影自相隨送薛良友往越州謁從叔辭家日巳久與子分仍深易得思鄉淚難為欲别心孤雲隨浦口幾日到山隂遙想蘭亭下清風滿竹林送貟上人還蘭若得道雲林久年深暫一歸出山逢世亂乞食覺人希半偈𥘉傳法中峰又掩扉愛憎應不染塵俗自依依送丘二十二歸蘇州積水與寒烟嘉禾路幾千孤猿鳴海嶠群雁起湖田曾見長洲苑嘗聞大雅篇卻將封事去知爾得間眠𥘉拜命後酬丘二十二見贈江海久垂綸朝衣忽挂身丹墀方謁帝白髮免羞人才傑文章士名當諌爭臣空餘薦賢分不敢負交親題桐廬李明府官舍訟堂寂寂對烟霞五栁門前晚聚鴉流水聲中視公事寒山影裏見人家移風共美新為政計日還知更觸邪郤憶陶潜無限酒不逢籬菊便開花清江曲內一絶折腰躰八月長江去浪平片帆一道帶風輕極目不分天水色南山南是嶽陽城張繼貟外纍代詞伯積習弓裘其於為文不雕自飾及爾登第秀發當時詩體清迥有道者風如女停襄邑杼農廢汶陽耕可謂事理雙切又火燎原猶熱風搖海未平比興深矣送判官往陳留齊宋分巡地頻年此用兵女停襄邑杼農廢汶陽耕使者乘軺去諸藩擁節迎深仁佐君子薄賦恤黎氓火燎原猶熱風搖海未平應將否泰理一問魯諸生感懷調與時人背心將靜者論終年帝城裏不識五侯門夜泊松江月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鍾聲到客船劉長卿長卿有吏幹剛而犯上兩遭遷謫皆自取之詩體雖不新竒甚能鍊飾大抵十首巳上語意稍同於落句尤甚思鋭才窄也如草色加湖緑松聲小雪寒又沙鷗驚小吏湖色上高枝又細雨濕衣看不見間花落地聽無聲裁長𥙷短蓋絲之纇歟其得罪風霜苦全生天地仁可謂傷而不怨亦足以發揮風雅矣題崔公庭竹不學媚清瀾能依上將壇朦朧低冕過靑翠捲簾看得地移根逺經霜抱節難紉花成鳳實嫩笋長漁竿藹藹軍容靜蕭蕭郡宇寬細音和角響踈影上門寒阮巷何人在梁園幾處􅋊空餘軒屏側歲晚對一作伴任安送朱山人越州賊退歸山隂别業越中𥘉戰罷江上送歸橈南渡無來客西陵自落潮空城垂故栁舊業廢春苗閭里誰相見鶯花共寂寥謫至于越亭作天南愁望絶亭上栁條新落日獨歸鳥孤舟何處人生涯投嶺徼世業陷邊塵江入千峰暮花迎百越春秦臺憐白首楚水怨青蘋草色無征路鶯聲傍逐臣獨醒翻引笑直道不容身得罪風霜苦全生天地仁靑山數行淚滄海一窮鱗牢落機心盡空憐鷗鳥親陪鄭中丞林園宴心逺親魚鳥功成厭鼓鼙林中阮家醉池上謝公題門徑蒼苔合窗隂緑篠低夕易山向背秋草水東西舊架懸藤老踈籬插槿齊風烟不可到誰羡武陵溪送張繼司直適越時危身適越事往任浮沉萬里江山去孤舟百戰心春風吳渚緑古木剡山深明月滄州路歸雲不可尋送駱三少府西山應制汀洲芳草緑日暮更芬芬舊國無來信春江獨送君五言凌白雪六翮向靑雲自是無機者沙鷗巳可羣送李中丞之襄州流落征南將曾驅十萬師罷歸無舊業老去變明時獨立三邊靜輕生一劒知茫茫漢江上日暮欲何之題鄭山人幽居一作寂寂孤鶯啼杏園寥寥一犬吠桃源白首深藏谷口村春山犬吠武陵原落花芳草無行處萬􅊤千峰獨閉門送郎士元春風倚棹闔閭城水國春深隂復晴細雨濕衣看不見間花落地聽無聲日斜江上孤帆影草緑湖南萬里程東道若逢相識問青𫀆今日誤儒生李季蘭士有百行女唯四德季蘭則不然形氣既雌詩意亦蕩自鮑昭以下罕有其倫如遠水浮仙棹寒星伴使車蓋五言之佳境也上倣班姬則不足下比韓英則有餘不以遲暮亦一俊嫗湖上臥病喜陸鴻漸至昔去繁霜月今來苦霧時相逢仍卧病欲語淚先垂強勸陶家酒還吟謝客詩偶然成一醉此外更何之寄校書七兄無事烏程縣蹉跎歲月餘不知藝閣吏寂寞竟何如遠水浮仙棹寒星伴使車因過大雷岸莫忘幾行書寄朱放望水試登山山高湖又闊相思無曉夕相望經年月鬱鬱山木榮綿綿野花發别後無限情相逢一時說送韓揆之江西相看指楊栁别恨轉依依萬里江西水孤舟何處歸湓城潮不到夏口信應稀唯有衡陽雁年年來去飛道意寄崔侍郎莫漫戀浮名應須薄宦情百年齊旦暮前事盡虛盈愁鬢行看白童顔學未成無過天竺國依止故先生賦得三峽流泉歌妾家夲住巫山雲巫山流泉常自聞玉琴奏出轉寥敻直似當時夢裏聽三峽迢迢幾千里一時流入幽閨裏巨石崩嵓指下生飛泉走浪絃中起𥘉疑憤怒含雷風又似嗚咽流不通回湍曲瀨勢將盡時復滴瀝平沙中憶昔阮公為此曲能令仲容聽不足一彈既罷還一彈願似流泉鎮相續竇參竇君詩亦祖沈千運比於孟雲卿尚在廊廡間如萬丈水聲落四時松色寒又人生年幾齊憂苦亦先老雖其羽翼未齊而筋骨巳具間居湖上避影將息隂自然知音稀向來深林中偶亦有所窺飛鳥口銜食引雛上高枝但各子其子寧知冝不冝止止復何言物情方可知登潜山觀山勢欲相抱一條微徑盤攀夢歇復行始得凌仙壇聞道葛夫子此中鍊還丹丹成五色光服之生羽翰靈草空自緑餘霞誰復飱至今步虛處猶有孤飛鸞幽幽古殿門下壓浮雲端萬丈水聲落四時松色寒既入無何鄉轉嫌人事難終當逺塵俗高臥從所安遷謫江表久未歸一自經放逐徘徊無所從便為寒山雲不得隨飛龍名豈不欲保歸豈不欲早苦無三月資逺適萬里道離心與羈思終日苦草草人生年幾齊憂苦亦先老誰能假羽翼使我暢懷抱道人靈一自齊梁以來道人工文多矣罕有入其流者一公乃能刻意精妙與士大夫更唱迭和不其偉歟如泉涌階前地雲生戶外峰則道猷寶月曾何及此酬皇甫冉赴無錫於雲門寺贈詩别湖南通古寺來往意無涯欲識雲門路千峰到若耶春山子猷宅古木謝敷家自可長偕隱那云相去賖宿靈洞觀石室因投宿仙翁幸見容花原隔水見洞府過山逢泉涌階前地雲生戶外峰中宵自入定非是欲降龍靜林寺即武帝隱所有鐘磬皆古物時時有聲靜林溪路逺蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三世火樹老萬株松無數烟霞色空聞昔臥龍雨後欲尋天目山問元駱二公溪路絶句昨夜雲生天井東春山一雨幾回風林花併逐溪流下欲上龍池通不通姚倫姚子詩雖未弘深去凡巳逺屬辭比事不失文流如亂聲千葉下寒影一巢孤篇什之秀也感秋林試向東林望方悲節候殊亂聲干葉下寒影一巢孤不蔽秋天雁驚飛夜月烏霜風與春日幾度遣榮枯過章秀才客舍逹人心自適旅舍當間居不出來時徑重看讀了書晚嵐山色近秋日樹隂踈盡是忘言客聽君誦子虛皇甫曾昔孟陽之與景陽詩德逺慙厥弟協居上品載處下流今侍御之與𥙷闕文辭亦爾體制清潔華不勝文然寒生五湖道春及萬年枝五言之選也其為士林所尚冝哉送雲門雍上人春山臨一室獨坐草萋萋身寂心成道花間鳥自啼細泉松徑裏反照竹林西晚與門人别依依出虎溪送林中丞還京戰罷回龍節朝天見鳳池寒生五湖道春及萬年枝邵化多遺愛胡清巳畏知懷恩多感别墜淚向旌旗贈别筌公律儀傳教誘僧臘老烟霄樹色依禪誦泉聲入寂寥龕龍來逺國畫壁見南朝深戶風開合寒泉月對搖息心居靜理愛定至中宵更欲尋真去乘船泛海潮送杜中丞還京上將還專席雙旌復出秦關河三晉路賔從五原人孤戍雲連海平沙雪度春酬恩看玉劍何處有烟塵早朝日寄所知長安歲後見歸鴻紫禁朝天拜舞同曙色漸分雙闕下漏聲遙在百花中爐烟乍起開仙仗玉珮成行引上公共荷發生同雨露不應黃葉久從風孟雲卿鄴城懷古朝發淇水南將尋北燕路魏家舊城闕寥落無人住伊昔天地屯曹公獨中據羣臣將北靣白日忽西暮三臺竟寂寥萬世難長固雄豪安在哉衰草沾霜露崔嵬長河北尚見應劉墓古樹藏龍蛇荒茅伏狐兔永懷故池館數子連章句逸興驅山河雄詞變雲霧我行覩遺跡精爽如相遇斗酒將酬君悲風白楊樹傷情為長心易憂早孤意常傷出門先躊躇入戶亦倣徨此生一何苦前事安可忘兄弟先我沒孤幼盈我傍舊居近東南河水新為梁松柏今在兹安忍思故鄉四時與日月萬物各有常秋風巳一起草木無不霜行行當自勉不忍再思量傷時徘徊宋郊上不見平生親獨立正傷心悲風來孟津大方載羣物生死有常倫虎豹不相食哀哉人食人豈伊逢世運天道亮云云同前大空流素月三五何明明光耀侵白日賢愚迷至精四時更變化天道有虧盈常恐今夜沒須臾還復生西蜀劉灣出塞曲將軍在重圍音信絶不通羽書如流星飛入甘泉宫倚是并州兒少年心膽雄一朝隨召募百戰爭王公去年桑乾北今年桑乾東死是征人死功是將軍功汗馬牧秋月疲卒臥霜風仍聞左賢王更欲圍雲中虹縣嚴孝子墓至性教不及因心天所資禮聞三年喪汝獨終身期下布骨肉恩上報父母慈禮聞哭有卒汝獨哀無時前有松柏林荆棘結蒙籠墓門白日閉泣血黃枲中草服蔽枯骨垢容載飛蓬舉聲哭蒼天萬木皆悲風李陵別蘇武漢武愛邊功李陵提步卒轉戰單于庭身隨漢軍沒李陵不愛死心存歸漢闕誓欲還國恩不為胸奴屈身辱家已無長居狼虎窟胡天無春風虜地多積雪窮隂愁殺人况與蘇武別發聲天地哀執手肺腸絶白日為我愁隂雲為我結生為漢宫臣死為胡地骨萬里長相思終身望南月雲南曲百蠻亂南方群盜如蝟起騷然疲中原征戰從此始白門大和城來往一萬里去者無全生十人九人死岱馬卧陽山燕兵哭瀘水妻行求死夫父行求死豫蒼天滿愁雲白骨積空罍哀哀雲南行十萬同已矣張南史張君奕碁者中歲感激苦節學文數載間稍入詩境如巳被秋風教憶鱠更聞寒雨歡飛觴可謂物理俱美情致兼深送朱文北遊歲暮欲為别江湖聊自寬且無人事戀誰謂客行難郢曲憐公子吳州憶伯鸞蒼蒼逺山際松柏獨冝寒陸勝宅秋雨中探韻同作同人永日自相將深竹間園偶辟強巳𬒳秋風教憶鱠更聞寒雨勸飛觴歸心莫問三江水旅服從沾九日霜醉裏欲尋騎馬路蕭條幾處有垂楊送司空十四遊宋州危城下蕭條送爾歸寒風聞畫角暮雪犯征衣道里猶成間親門重與違白雲愁欲斷看大梁飛中興間氣集卷之下終中興間氣集姓氏卷上錢起十二首張衆甫三首于良史三首鄭丹二首李希仲二首李嘉祐八首章八元一首戴叔倫六首皇甫冉十三首杜誦一首朱灣七首韓翃七首蘇渙三首卷下郎士元十二首崔峒九首張繼三首劉長卿九首李季蘭六首竇參三首道人靈一四首姚倫二首皇甫曾五首鄭常三首孟雲卿六首劉灣四首張南史三首中興間氣集姓氏畢中興間氣集目録渤海高仲武集卷之上錢起奉送劉相公催轉運裴迪書齊玩月之作廣德𥘉鑾駕出關後愁望之作太子李舍人城中别業與文士逃暑詠白油帽送客東臯早春寄郎四校書闕下贈裴舍人送溫逸人送李史赴洪州宿畢侍郎宅夜靜酬通上人問疾山中寄時校書張衆文寄興園池鶴上劉相公送李觀之宣州謁袁中丞得三州渡送李司直使吳于良史冬日野望間居鄭丹玄宗至道大聖大眀皇帝挽歌肅宗挽歌李希仲東皇太乙祠薊北行二首李嘉祐發湓浦望山作𥘉晴直省賫勑江隂送王牧吉州謁使君叔潤州王别駕宅送蔣九侍御歸楊州奉陪韋潤州送鶴林寺仲夏江隂官舍寄裴明府送韋貟外端公宣慰勸農畢赴洪州登楚城驛十里村竹林次交映送從弟任饒州録事參軍章八元新安江行戴叔倫送夷甫宰鄼縣送趙主簿自蜀歸綘州覲省皇甫冉送王相公赴幽州題裴固新園酬袁𥙷闕中天寺見寄酬崔侍御期蘇道士不至巫山高和袁郎中破賊後經剡中山水送元晟還於潜山所居獨孤中丞筵陪餞韋使君赴升州同杜相公對山僧作送林貟外往江南送李録事赴饒州秋日東林作少室韋鍊師升仙杜誦哭長孫侍御朱灣燕居寒菊花奉使設宴戲擲龍籌詠雙陸頭子詠壁上酒瓢呈蕭明府詠玉送陳偃賦得白鳥翔翠微題假上人院壁畫古松韓翃送辰州李中丞題薦福寺衡嶽禪師房奉送王相公赴幽州題蘇許公林亭送孫革及第後歸江南題僧房送太常元博士歸潤州蘇渙變律同前同前卷之下郎士元送楊中丞和蕃送奚賈歸吳别鄭礒送長沙韋明府之縣送洪州李别駕之任送裴𥙷闕入河東幕春日宴張舍人宅送陸貟外赴潮州送王棼流雷州題劉相公三湘圖送孫侍郎往容府宣慰塞下曲崔峒春日憶姚氏外甥題崇福寺禪師院江上書懷送薛良友往越州謁從叔送真上人還蘭若送丘二十二歸蘇州𥘉辭命後酬丘二十二見贈題桐廬李明府官舍清江曲內一絶折腰體張繼送判官往陳留感懷夜泊松江劉長卿題崔公庭竹送朱山人越州賊退歸山隂别業謫至干越亭作陪鄭中丞林園宴送張繼司直適越送駱三少府西山應制送李中丞之襄州題鄭山人幽居送郎士元李季蘭湖上卧病喜陸鴻漸至寄校書七兄寄朱放送韓揆之江西道意寄崔侍郎賦得三峽流泉歌竇參間居湖上登潜山觀遷謫江表久未歸道人靈一酬皇甫冉赴無錫於雲門寺贈詩别宿靈洞觀靜林寺即武帝隱所有鐘磬皆古物時時有聲雨後欲尋天目山問元駱二公溪路絶句姚倫感秋林過章秀才客居皇甫曾送雲門雍上人送林中丞還京贈别筌公送杜中丞還京早朝日寄所知孟雲卿鄴城懷古傷情傷時同前西蜀劉灣出塞曲虹縣嚴孝子墓作李陵别蘇武雲南曲張南史送朱文北遊陸勝宅秋雨中探韻同作送司空十四遊宋州中興間氣集目録終
